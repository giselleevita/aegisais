apiVersion: v1
kind: Secret
metadata:
  name: aegisais-secrets
  labels:
    app.kubernetes.io/part-of: aegisais
    aegisais.io/profile: managed-deps
type: Opaque
stringData:
  # Required: SQLAlchemy DSN for managed PostgreSQL endpoint.
  DATABASE_URL: postgresql+psycopg://aegisais:<password>@<managed-postgres-host>:5432/aegisais

  # Required: Redis DSN for managed Redis endpoint.
  REDIS_URL: redis://:<password>@<managed-redis-host>:6379/0

  # Required: 32+ character secret in production.
  SECRET_KEY: replace-with-strong-32-char-minimum-secret

  # Optional provider tokens.
  TELEGEOGRAPHY_TOKEN: ""
  EO_PROVIDER_TOKEN: ""
  ITDAE_AIS_API_KEY: ""
  ITDAE_BALTIC_BBOX: ""
