apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: web
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: aegisais
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
        app.kubernetes.io/part-of: aegisais
    spec:
      containers:
        - name: web
          image: ghcr.io/giselleevita/aegisais-web:stable
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
  strategy:
    canary:
      canaryService: web-canary
      stableService: web
      trafficRouting:
        nginx:
          stableIngress: aegisais-ingress
      steps:
        - setWeight: 10
        - pause:
            duration: 90s
        - setWeight: 50
        - pause:
            duration: 180s
        - setWeight: 100
