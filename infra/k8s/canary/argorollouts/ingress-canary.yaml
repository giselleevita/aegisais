apiVersion: v1
kind: Service
metadata:
  name: api-canary
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: aegisais
spec:
  selector:
    app.kubernetes.io/name: api
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: web-canary
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: aegisais
spec:
  selector:
    app.kubernetes.io/name: web
  ports:
    - name: http
      port: 80
      targetPort: http
