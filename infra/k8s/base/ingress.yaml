apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aegisais-ingress
  labels:
    app.kubernetes.io/part-of: aegisais
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: aegisais.local
      http:
        paths:
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
    - host: bff.aegisais.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bff
                port:
                  number: 8081
