apiVersion: apps/v1
kind: Deployment
metadata:
  name: itdae-ingestion
  labels:
    app.kubernetes.io/name: itdae-ingestion
    app.kubernetes.io/part-of: aegisais
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: itdae-ingestion
  template:
    metadata:
      labels:
        app.kubernetes.io/name: itdae-ingestion
        app.kubernetes.io/part-of: aegisais
    spec:
      containers:
        - name: worker
          image: ghcr.io/giselleevita/aegisais-api:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          command: ["python", "-m", "app.modules.itdae.ingestion.stream"]
          envFrom:
            - configMapRef:
                name: aegisais-config
            - secretRef:
                name: aegisais-secrets
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import os,time,sys;p='/tmp/worker_itdae_heartbeat';sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p)<180 else 1)"
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
