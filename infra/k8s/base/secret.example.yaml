apiVersion: v1
kind: Secret
metadata:
  name: aegisais-secrets
  labels:
    app.kubernetes.io/part-of: aegisais
type: Opaque
stringData:
  DATABASE_URL: postgresql+psycopg://aegisais:<password>@postgres-rw.aegisais.svc.cluster.local:5432/aegisais
  REDIS_URL: redis://:<password>@redis-master.aegisais.svc.cluster.local:6379/0
  SECRET_KEY: replace-with-strong-32-char-minimum-secret
  REDIS_PASSWORD: replace-with-redis-password
  TELEGEOGRAPHY_TOKEN: ""
  EO_PROVIDER_TOKEN: ""
  ITDAE_AIS_API_KEY: ""
  ITDAE_BALTIC_BBOX: ""
