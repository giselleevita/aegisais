apiVersion: v1
kind: ConfigMap
metadata:
  name: aegisais-config
  labels:
    app.kubernetes.io/part-of: aegisais
data:
  APP_ENV: production
  WEBSOCKET_REQUIRE_AUTH: "true"
  CORS_ALLOWED_ORIGINS: "https://aegisais.example.com"
  ALLOW_REPLAY: "false"
  BFF_HOST: 0.0.0.0
  BFF_PORT: "8081"
  BFF_RATE_LIMIT_PER_MINUTE: "120"
  BFF_MANIFEST_CACHE_TTL_MS: "30000"
  BFF_WS_HEARTBEAT_MS: "15000"
