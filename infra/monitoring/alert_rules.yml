# Alert rules for AegisAIS (Sprint 2 — IMPLEMENTATION_PLAN Task 2.5)
groups:
  - name: aegisais
    rules:
      - alert: AegisAISStreamLagHigh
        expr: |
          max(aegisais_stream_lag) > 1000
          or max(aegisais_stream_lag_persistence) > 1000
          or max(aegisais_stream_lag_alert) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Redis stream lag is high for at least one AIS stream
          description: Processing consumer backlog suggests ingestion or processing is falling behind.

      - alert: AegisAISAPIDown
        expr: up{job="aegisais_api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: AegisAIS API scrape target is down
          description: Prometheus cannot scrape the API /metrics endpoint.

      - alert: AegisAISHighAlertRate
        expr: sum(rate(aegisais_alerts_total[5m])) * 60 > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Alert generation rate is unusually high
          description: Possible data feed issue or detection threshold misconfiguration.

      - alert: AegisAISNoPositionsProcessed
        expr: increase(aegisais_positions_processed_total[10m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: No AIS positions processed in the last 10 minutes
          description: Ingestion or processing worker may be stalled.

      # BL-007 Redis degraded-mode alerts
      - alert: AegisAISCooldownRedisDegraded
        expr: increase(aegisais_cooldown_redis_degraded_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Alert cooldown is using in-memory fallback (Redis unavailable)
          description: >
            Redis is unreachable for cooldown checks. Cooldown is bounded per
            process but not cluster-safe; alert spam is possible across replicas.
            Investigate Redis connectivity immediately.

      - alert: AegisAISTokenRevocationDegraded
        expr: increase(aegisais_token_revocation_redis_degraded_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Token revocations are being lost (Redis unavailable)
          description: >
            Redis is unreachable for token revocation writes. Revoked tokens may
            remain valid until Redis recovers and tokens expire naturally.
            Review active sessions and investigate Redis connectivity immediately.

      - alert: AegisAISTokenCheckDegraded
        expr: increase(aegisais_token_check_redis_degraded_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Token revocation checks are being skipped (Redis unavailable)
          description: >
            Redis is unreachable for JTI revocation lookups. Requests are being
            allowed through with unverified revocation status (fail-open policy).
            Correlate with AegisAISTokenRevocationDegraded to assess exposure.
