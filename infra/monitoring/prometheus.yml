# Prometheus scrape config for AegisAIS (Sprint 2 — IMPLEMENTATION_PLAN Task 2.5)
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: aegisais_api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000

  - job_name: aegisais_workers
    metrics_path: /metrics
    static_configs:
      - targets:
          - processing-worker:9000
          - persistence-worker:9001
          - alert-worker:9002
