services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: aegisais
      POSTGRES_USER: aegisais
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegisais}
    volumes:
      - aegisais_pg:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    restart: unless-stopped

  api:
    build:
      context: ../../apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://aegisais:${POSTGRES_PASSWORD:-aegisais}@db:5432/aegisais
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      APP_ENV: production
    depends_on:
      - db
      - redis
    restart: unless-stopped

  bff:
    build:
      context: ../../apps/bff
    environment:
      BFF_HOST: 0.0.0.0
      BFF_PORT: 8081
      DATABASE_URL: postgres://aegisais:${POSTGRES_PASSWORD:-aegisais}@db:5432/aegisais
    depends_on:
      - db
    restart: unless-stopped

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    restart: unless-stopped

  nginx:
    image: nginx:1.31-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - web
      - bff
    restart: unless-stopped

volumes:
  aegisais_pg:
