services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: aegisais
      POSTGRES_USER: aegisais
      POSTGRES_PASSWORD: aegisais
    ports:
      - "5432:5432"
    volumes:
      - aegisais_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegisais -d aegisais"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "6379:6379"
    volumes:
      - aegisais_redis:/data
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--no-auth-warning",
          "-a",
          "${REDIS_PASSWORD:-changeme}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ../../apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://aegisais:aegisais@db:5432/aegisais
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      APP_ENV: docker
    # API is reached via nginx on 80/443. Uncomment for debugging without TLS:
    # ports:
    #   - "8000:8000"
    volumes:
      - ../../data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health')",
        ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.3.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - aegisais_prometheus:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  backup:
    image: postgres:16
    environment:
      PGHOST: db
      PGUSER: aegisais
      PGDATABASE: aegisais
      PGPASSWORD: ${POSTGRES_PASSWORD:-aegisais}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./backup/backup.sh:/backup.sh:ro
      - aegisais_backups:/backups
    command: >
      sh -c "while true; do sleep 86400; sh /backup.sh; done"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  itdae-ingestion:
    build:
      context: ../../apps/api
    command: python -m app.modules.itdae.ingestion.stream
    environment:
      DATABASE_URL: postgresql+psycopg://aegisais:aegisais@db:5432/aegisais
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      ITDAE_AIS_API_KEY: ${ITDAE_AIS_API_KEY:-}
      ITDAE_BALTIC_BBOX: ${ITDAE_BALTIC_BBOX:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test $(( $(date +%s) - $(stat -c %Y /tmp/worker_itdae_heartbeat) )) -lt 120",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  processing-worker:
    build:
      context: ../../apps/api
    command: python -m app.services.workers.processing_worker
    environment:
      DATABASE_URL: postgresql+psycopg://aegisais:aegisais@db:5432/aegisais
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test $(( $(date +%s) - $(stat -c %Y /tmp/worker_processing_heartbeat) )) -lt 120",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  persistence-worker:
    build:
      context: ../../apps/api
    command: python -m app.services.workers.persistence_worker
    environment:
      DATABASE_URL: postgresql+psycopg://aegisais:aegisais@db:5432/aegisais
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test $(( $(date +%s) - $(stat -c %Y /tmp/worker_persistence_heartbeat) )) -lt 120",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  alert-worker:
    build:
      context: ../../apps/api
    command: python -m app.services.workers.alert_worker
    environment:
      DATABASE_URL: postgresql+psycopg://aegisais:aegisais@db:5432/aegisais
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test $(( $(date +%s) - $(stat -c %Y /tmp/worker_alert_heartbeat) )) -lt 120",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  aegisais_pg:
  aegisais_redis:
  aegisais_backups:
  aegisais_prometheus:
