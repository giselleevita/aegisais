# Local development and smoke-testing stack.
# Production/staging deployments should use manifests under infra/k8s/.
services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: aegisais
      POSTGRES_USER: aegisais
      POSTGRES_PASSWORD: aegisais
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - aegisais_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegisais -d aegisais"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - aegisais_redis:/data
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--no-auth-warning",
          "-a",
          "${REDIS_PASSWORD:-changeme}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ../../apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://aegisais:aegisais@db:5432/aegisais
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-local-docker-secret-key-change-before-production-2026}
      APP_ENV: docker
      AISSTREAM_API_KEY: ${AISSTREAM_API_KEY:-}
      AISSTREAM_BBOX: ${AISSTREAM_BBOX:-50.5,10.0,65.0,30.0}
    # API is reached via nginx on 80/443. Uncomment for debugging without TLS:
    # ports:
    #   - "8000:8000"
    volumes:
      - ../../data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health')",
        ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  bff:
    build:
      context: ../../apps/bff
    environment:
      APP_ENV: docker
      BFF_HOST: 0.0.0.0
      BFF_PORT: 8081
      DATABASE_URL: postgres://aegisais:aegisais@db:5432/aegisais
      TELEGEOGRAPHY_TOKEN: ${TELEGEOGRAPHY_TOKEN:-}
      EO_PROVIDER_TOKEN: ${EO_PROVIDER_TOKEN:-}
    ports:
      - "${BFF_HOST_PORT:-8081}:8081"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8081/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  web:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "cd apps/web && npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    environment:
      VITE_BFF_URL: http://bff:8081
    ports:
      - "${WEB_HOST_PORT:-5174}:5174"
    volumes:
      - ../../:/workspace
    depends_on:
      bff:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_HTTP_HOST_PORT:-80}:80"
      - "${NGINX_HTTPS_HOST_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.3.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - aegisais_prometheus:/prometheus
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  backup:
    image: postgres:16
    environment:
      PGHOST: db
      PGUSER: aegisais
      PGDATABASE: aegisais
      PGPASSWORD: ${POSTGRES_PASSWORD:-aegisais}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./backup/backup.sh:/backup.sh:ro
      - aegisais_backups:/backups
    command: >
      sh -c "while true; do sleep 86400; sh /backup.sh; done"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  itdae-ingestion:
    build:
      context: ../../apps/api
    command: python -m app.modules.itdae.ingestion.stream
    environment:
      DATABASE_URL: postgresql+psycopg://aegisais:aegisais@db:5432/aegisais
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      ITDAE_AIS_API_KEY: ${ITDAE_AIS_API_KEY:-}
      ITDAE_BALTIC_BBOX: ${ITDAE_BALTIC_BBOX:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test $(( $(date +%s) - $(stat -c %Y /tmp/worker_itdae_heartbeat) )) -lt 120",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  processing-worker:
    build:
      context: ../../apps/api
    command: python -m app.services.workers.processing_worker
    environment:
      DATABASE_URL: postgresql+psycopg://aegisais:aegisais@db:5432/aegisais
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-local-docker-secret-key-change-before-production-2026}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test $(( $(date +%s) - $(stat -c %Y /tmp/worker_processing_heartbeat) )) -lt 120",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  persistence-worker:
    build:
      context: ../../apps/api
    command: python -m app.services.workers.persistence_worker
    environment:
      DATABASE_URL: postgresql+psycopg://aegisais:aegisais@db:5432/aegisais
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-local-docker-secret-key-change-before-production-2026}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test $(( $(date +%s) - $(stat -c %Y /tmp/worker_persistence_heartbeat) )) -lt 120",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  alert-worker:
    build:
      context: ../../apps/api
    command: python -m app.services.workers.alert_worker
    environment:
      DATABASE_URL: postgresql+psycopg://aegisais:aegisais@db:5432/aegisais
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-local-docker-secret-key-change-before-production-2026}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test $(( $(date +%s) - $(stat -c %Y /tmp/worker_alert_heartbeat) )) -lt 120",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  aegisais_pg:
  aegisais_redis:
  aegisais_backups:
  aegisais_prometheus:
