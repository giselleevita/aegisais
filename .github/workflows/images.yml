name: Build and Publish Images

on:
  push:
    branches: [main]
    paths:
      - apps/api/**
      - apps/bff/**
      - apps/web/**
      - .github/workflows/images.yml
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional override tag"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tag
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-${GITHUB_SHA::12}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push API image
        id: build-api
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/aegisais-api:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/aegisais-api:latest

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@0.33.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/aegisais-api:${{ steps.vars.outputs.tag }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Attest API image provenance
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/aegisais-api
          subject-digest: ${{ steps.build-api.outputs.digest }}
          push-to-registry: true

      - name: Build and push BFF image
        id: build-bff
        uses: docker/build-push-action@v6
        with:
          context: ./apps/bff
          file: ./apps/bff/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/aegisais-bff:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/aegisais-bff:latest

      - name: Scan BFF image with Trivy
        uses: aquasecurity/trivy-action@0.33.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/aegisais-bff:${{ steps.vars.outputs.tag }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Attest BFF image provenance
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/aegisais-bff
          subject-digest: ${{ steps.build-bff.outputs.digest }}
          push-to-registry: true

      - name: Build and push Web image
        id: build-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/aegisais-web:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/aegisais-web:latest

      - name: Scan Web image with Trivy
        uses: aquasecurity/trivy-action@0.33.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/aegisais-web:${{ steps.vars.outputs.tag }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Attest Web image provenance
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/aegisais-web
          subject-digest: ${{ steps.build-web.outputs.digest }}
          push-to-registry: true

      - name: Build summary
        run: |
          echo "Published image tag: ${{ steps.vars.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/${{ github.repository_owner }}/aegisais-api:${{ steps.vars.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/${{ github.repository_owner }}/aegisais-bff:${{ steps.vars.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/${{ github.repository_owner }}/aegisais-web:${{ steps.vars.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trivy image scans passed for API, BFF, and Web" >> $GITHUB_STEP_SUMMARY
