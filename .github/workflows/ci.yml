name: AegisAIS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  supply-chain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Audit coverage gate
        run: python3 scripts/check_audit_coverage.py

      - name: Generate backend SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./apps/api
          format: cyclonedx-json
          output-file: backend-sbom.cdx.json

      - name: Generate frontend SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./apps/web
          format: cyclonedx-json
          output-file: frontend-sbom.cdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-sboms
          path: |
            backend-sbom.cdx.json
            frontend-sbom.cdx.json

      - name: Attest SBOM provenance
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            backend-sbom.cdx.json
            frontend-sbom.cdx.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend audit tooling
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit==2.10.0 pip-tools==7.5.3
          pip-sync requirements-dev.lock

      - name: Backend vulnerability gate
        working-directory: apps/api
        run: |
          pip-audit -r requirements.lock \
            --ignore-vuln CVE-2024-23342 \
            --ignore-vuln PYSEC-2026-161

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend vulnerability gate
        run: npm audit --audit-level=high

  backend:
    runs-on: ubuntu-latest
    needs: supply-chain
    defaults:
      run:
        working-directory: apps/api

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependency tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-tools==7.5.3

      - name: Validate lockfiles
        if: matrix.python-version == '3.11'
        run: |
          ./scripts/check_lockfiles.sh

      - name: Sync backend dependencies
        run: |
          pip-sync requirements-dev.lock
          python -m pip install --no-deps -e .
          python -m pip check

      - name: Lint (ruff)
        run: |
          python -m ruff check app

      - name: Type check (mypy)
        run: |
          python -m mypy app

      - name: Run backend tests
        run: |
          python -m pytest -q

      - name: Validate contract samples
        if: matrix.python-version == '3.11'
        run: |
          python ../../scripts/check_contract_samples.py

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: apps/api/coverage.xml
          flags: backend
          fail_ci_if_error: false

  frontend:
    runs-on: ubuntu-latest
    needs: supply-chain

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (workspaces)
        run: npm ci

      - name: Lint web app
        run: npm run lint -w @aegisais/web

      - name: Build web app
        run: npm run build -w @aegisais/web

  # Fast path: e2e harness exits 0 without installing browsers (regression guard for script).
  e2e-smoke:
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (workspaces)
        run: npm ci

      - name: E2E script (skipped when E2E=0)
        run: E2E=0 npm run test:e2e -w @aegisais/web

  e2e-playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (workspaces)
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium (system deps + browsers)
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        run: npm run test:e2e -w @aegisais/web
        env:
          CI: "true"
