name: AegisAIS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependency tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-tools==7.5.3

      - name: Validate lockfiles
        run: |
          ./scripts/check_lockfiles.sh

      - name: Sync backend dependencies
        run: |
          pip-sync requirements-dev.lock
          python -m pip install --no-deps -e .
          python -m pip check

      - name: Security audit
        run: |
          python -m pip install pip-audit==2.10.0
          pip-audit -r requirements.lock

      - name: Lint (ruff)
        run: |
          python -m ruff check app

      - name: Type check (mypy)
        run: |
          python -m mypy app

      - name: Run backend tests
        run: |
          python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: |
          if npm run lint -- --version >/dev/null 2>&1; then
            npm run lint
          else
            echo "No lint script defined, skipping."
          fi
