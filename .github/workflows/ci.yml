name: AegisAIS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependency tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-tools==7.5.3

      - name: Validate lockfiles
        run: |
          ./scripts/check_lockfiles.sh

      - name: Sync backend dependencies
        run: |
          pip-sync requirements-dev.lock
          python -m pip install --no-deps -e .
          python -m pip check

      - name: Security audit
        run: |
          python -m pip install pip-audit==2.10.0
          pip-audit -r requirements.lock

      - name: Lint (ruff)
        run: |
          python -m ruff check app

      - name: Type check (mypy)
        run: |
          python -m mypy app

      - name: Run backend tests
        run: |
          python -m pytest -q

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (workspaces)
        run: npm ci

      - name: Lint web app
        run: npm run lint -w @aegisais/web

      - name: Build web app
        run: npm run build -w @aegisais/web

  # Fast path: e2e harness exits 0 without installing browsers (regression guard for script).
  e2e-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (workspaces)
        run: npm ci

      - name: E2E script (skipped when E2E=0)
        run: E2E=0 npm run test:e2e -w @aegisais/web

  e2e-playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (workspaces)
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium (system deps + browsers)
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        run: npm run test:e2e -w @aegisais/web
        env:
          CI: "true"
